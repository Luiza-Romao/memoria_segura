# ===================================================================
#  Memoria Segura - configuracao da aplicacao
# ===================================================================

spring.application.name=memoria-segura
server.port=8080

# -------------------------------------------------------------------
#  MySQL
# -------------------------------------------------------------------
#  - O parametro createDatabaseIfNotExist=true faz o MySQL criar a
#    database "memoria_segura" automaticamente na primeira execucao.
#  - Ajuste username e password conforme sua instalacao do MySQL.
# -------------------------------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/memoria_segura?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=Luiza1313!

# -------------------------------------------------------------------
#  JPA / Hibernate
# -------------------------------------------------------------------
#  - update: o Hibernate cria/ajusta tabelas conforme as entidades,
#    sem apagar dados existentes.
#  - Use "create-drop" se quiser recriar do zero a cada execucao.
# -------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# -------------------------------------------------------------------
#  Swagger / OpenAPI
# -------------------------------------------------------------------
#  Documentacao interativa em http://localhost:8080/swagger-ui.html
# -------------------------------------------------------------------
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
